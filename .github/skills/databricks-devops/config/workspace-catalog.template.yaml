version: 1.0
updatedOn: "<UPDATE_DATE>"

# =============================================================================
# Workspace Catalog — Databricks environments
# =============================================================================
# Copy this file to workspace-catalog.yaml and fill in your actual values.
# workspace-catalog.yaml is gitignored and will NOT be committed.
# The agent resolves workspace context from this catalog before any operation.

workspaces:
  - environment: DEV
    name: "<DEV_WORKSPACE_NAME>"
    host: "<DEV_DATABRICKS_HOST_URL>"
    profile: "dev-profile"
    writeAllowed: true
    defaultCatalog: "<DEV_CATALOG>"
    defaultSchema: "default"
    notes: "Development workspace — full read/write access"

  - environment: UAT
    name: "<UAT_WORKSPACE_NAME>"
    host: "<UAT_DATABRICKS_HOST_URL>"
    profile: "uat-profile"
    writeAllowed: true
    defaultCatalog: "<UAT_CATALOG>"
    defaultSchema: "default"
    notes: "UAT workspace — write allowed for validation"

  - environment: PROD
    name: "<PROD_WORKSPACE_NAME>"
    host: "<PROD_DATABRICKS_HOST_URL>"
    profile: "prod-profile"
    writeAllowed: false
    defaultCatalog: "<PROD_CATALOG>"
    defaultSchema: "default"
    notes: "Production workspace — READ-ONLY, no write operations permitted"

# =============================================================================
# Authentication Notes
# =============================================================================
# Configure Databricks CLI profiles for each environment:
#   databricks auth login --host <workspace-url> --profile <profile-name>
#
# Or use environment variables:
#   DATABRICKS_HOST=https://adb-XXX.XX.azuredatabricks.net
#   DATABRICKS_TOKEN=dapi_XXXXXXXXXXXXXXXX
#
# For Azure Service Principal auth:
#   ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_TENANT_ID
