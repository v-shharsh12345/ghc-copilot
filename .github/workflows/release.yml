# Auto-create a GitHub Release whenever a version tag (vX.Y or vX.Y.Z) is pushed.
# The release body is extracted from RELEASES.md for the matching version.

name: Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from RELEASES.md
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"         # e.g. v1.2
          
          # Extract the section for this version from RELEASES.md
          # Matches "## vX.Y" or "## vX.Y.Z" header and captures everything until the next "## v" or EOF
          NOTES=$(awk -v tag="$TAG" '
            BEGIN { found=0 }
            /^## v/ {
              if (found) exit
              # Match the tag in the heading (e.g. "## v1.1 — Title")
              if (index($0, tag) > 0) { found=1; next }
            }
            found { print }
          ' RELEASES.md)
          
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG} — see [RELEASES.md](RELEASES.md) for details."
          fi
          
          # Write to file for gh release
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          
          # Derive title from RELEASES.md heading (e.g. "v1.1 — Databricks DevOps & Evaluation Framework")
          TITLE=$(grep -m1 "## ${TAG}" RELEASES.md | sed 's/^## //' || echo "$TAG")
          
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file release-notes.md
