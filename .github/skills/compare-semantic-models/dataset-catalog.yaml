# Semantic Model Comparator - Dataset Catalog
# Purpose: Map dataset names to IDs per environment for cross-environment comparison
#
# Fill in your dataset GUIDs below. Add one entry per semantic model you want
# to compare across environments.

metadata:
  version: "1.0"
  owner: "<YOUR_TEAM>"
  notes: "Replace <PLACEHOLDER> values with actual dataset GUIDs as environments are provisioned."

# =============================================================================
# DATASETS BY ENVIRONMENT
# =============================================================================
# Add your datasets below. Use the structure shown in the examples.

datasets:
  ExampleDataset1:
    summary: "<Description of what this dataset contains>"
    keyTables: [FactTable1, FactTable2, DimTable1, DimTable2, DimDate]
    keyMeasures: [Total Revenue, Total Count, Active Records]
    environments:
      DEV:
        datasetId: "<DEV_DATASET_GUID>"
      UAT:
        datasetId: "<UAT_DATASET_GUID>"
      PROD:
        datasetId: "<PROD_DATASET_GUID>"

  ExampleDataset2:
    summary: "<Description of second dataset>"
    keyTables: [FactActivity, DimPartner, DimEngagement, DimDate]
    keyMeasures: [Total Activities, Active Partners, Utilization Rate]
    environments:
      DEV:
        datasetId: "<DEV_DATASET_GUID>"
      UAT:
        datasetId: "<UAT_DATASET_GUID>"
      PROD:
        datasetId: "<PROD_DATASET_GUID>"

# =============================================================================
# QUICK LOOKUP TEMPLATE
# =============================================================================
# Example usage in agent:
#   1. User says: "Compare ExampleDataset1 DEV vs PROD"
#   2. Look up: datasets.ExampleDataset1.environments.DEV.datasetId
#   3. Look up: datasets.ExampleDataset1.environments.PROD.datasetId
#   4. Run GetSemanticModelSchema on both
#   5. Run comparison queries on both
#   6. Report differences
