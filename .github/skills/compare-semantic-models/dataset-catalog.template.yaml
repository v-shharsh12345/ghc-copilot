# Semantic Model Comparator - Dataset Catalog
# Purpose: Map dataset names to IDs per environment for cross-environment comparison
#
# Copy this file to dataset-catalog.yaml and fill in your actual dataset GUIDs.
# dataset-catalog.yaml is gitignored and will NOT be committed.

metadata:
  version: "<VERSION_DATE>"
  owner: "<YOUR_TEAM>"
  notes: "Replace <PLACEHOLDER> values with actual dataset GUIDs as environments are provisioned."

# =============================================================================
# DATASETS BY ENVIRONMENT
# =============================================================================

datasets:
  ExampleDataset1:
    summary: "Describe your first dataset — key tables, measures, and purpose."
    keyTables: [FactTable1, DimTable1, DimTable2, DimDate]
    keyMeasures: [Measure1, Measure2, Measure3]
    environments:
      DEV:
        datasetId: "<DEV_DATASET_ID>"
      UAT:
        datasetId: "<UAT_DATASET_ID>"
      PROD:
        datasetId: "<PROD_DATASET_ID>"

  ExampleDataset2:
    summary: "Describe your second dataset."
    keyTables: [FactTable2, DimTable3, DimDate]
    keyMeasures: [Measure4, Measure5]
    environments:
      DEV:
        datasetId: "<DEV_DATASET_ID>"
      UAT:
        datasetId: "<UAT_DATASET_ID>"
      PROD:
        datasetId: "<PROD_DATASET_ID>"

# Add additional datasets following the same pattern above.
