version: 1.0
updatedOn: 2026-02-18

# =============================================================================
# Workspace Catalog — Fill in your Fabric workspace GUIDs.
# This file is read by all Fabric DevOps capability skills.
# =============================================================================

workspaces:
  - environment: DEV
    name: "<YOUR_WORKSPACE_NAME> [DEV]"
    workspaceId: "<DEV_WORKSPACE_GUID>"
    writeAllowed: true
    defaultLakehouseName: "<LAKEHOUSE_NAME>"
    defaultLakehouseId: "<DEV_LAKEHOUSE_GUID>"

  - environment: UAT
    name: "<YOUR_WORKSPACE_NAME> [UAT]"
    workspaceId: "<UAT_WORKSPACE_GUID>"
    writeAllowed: true
    defaultLakehouseName: "<LAKEHOUSE_NAME>"
    defaultLakehouseId: "<UAT_LAKEHOUSE_GUID>"

  - environment: PROD
    name: "<YOUR_WORKSPACE_NAME> [PROD]"
    workspaceId: "<PROD_WORKSPACE_GUID>"
    writeAllowed: false
    defaultLakehouseName: "<LAKEHOUSE_NAME>"
    defaultLakehouseId: "<PROD_LAKEHOUSE_GUID>"
