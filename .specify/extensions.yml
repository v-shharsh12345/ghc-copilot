# Spec Kit extensions for the MSSales / GPS Platform monorepo.
# Read by the /speckit.* commands. Conventions encoded here are enforced
# by the constitution (Core Principles I–V) and by the AI PR Review pipeline.

version: 1

# ---------------------------------------------------------------------------
# Feature branch naming
# ---------------------------------------------------------------------------
# Every Spec Kit feature gets its own branch. Pattern: NNN-short-slug
# where NNN is a zero-padded sequence. The slug SHOULD reference the
# ADO Scenario Detail or Task ID when one exists (e.g. 042-40377-multi-pla-exemption).
branch:
  pattern: "^[0-9]{3}-[a-z0-9][a-z0-9-]{2,60}$"
  reject_message: |
    Spec Kit feature branches must match ^\d{3}-[a-z0-9-]{3,61}$.
    Recommended: NNN-<adoId>-<short-slug>   e.g. 042-40377-multi-pla-exemption

# ---------------------------------------------------------------------------
# Phase outputs — where each /speckit.* command writes
# ---------------------------------------------------------------------------
paths:
  specs_root: "specs"                 # specs/NNN-slug/spec.md, plan.md, tasks.md, checklist.md
  constitution: ".specify/memory/constitution.md"
  templates: ".specify/templates"

# ---------------------------------------------------------------------------
# Per-phase hooks
# ---------------------------------------------------------------------------
# after_* hooks run AFTER the named phase completes successfully and may
# offer (not force) an auto-commit. The PR review pipeline still gates merge.
hooks:
  after_specify:
    auto_commit: ask
    commit_message: "spec({id}): {title}"
  after_plan:
    auto_commit: ask
    commit_message: "plan({id}): {title}"
    require_constitution_check: true   # plan.md MUST contain a filled Constitution Check section
  after_tasks:
    auto_commit: ask
    commit_message: "tasks({id}): {title}"
    push_to_ado: ask                   # optionally create ADO Tasks via the ADO MCP server
    ado:
      project: "Global Partner Solutions"
      area_path_default: "Global Partner Solutions\\Sales and Consumption"
      iteration_default: "@CurrentIteration"
      tag_defaults: ["Copilot", "WorkFAST"]
      parent_link_strategy: "scenario-detail"   # parent each task to the SD referenced in spec.md
  after_checklist:
    auto_commit: ask
    commit_message: "checklist({id}): {title}"
  after_analyze:
    auto_commit: ask
    commit_message: "analyze({id}): {title}"
  after_implement:
    auto_commit: ask
    commit_message: "impl({id}): {title}"

# ---------------------------------------------------------------------------
# Constitution gates surfaced inside plan.md (Principles I–V)
# ---------------------------------------------------------------------------
constitution_gates:
  - id: P1_medallion
    name: "Medallion Layer Discipline"
    blocks_merge: true
  - id: P2_notebook_authoring
    name: "Notebook Authoring Standards"
    blocks_merge: true
  - id: P3_artifact_conventions
    name: "Fabric Artifact Conventions"
    blocks_merge: true
  - id: P4_security_supplychain
    name: "Security, Compliance & Supply-Chain Integrity (NON-NEGOTIABLE)"
    blocks_merge: true
  - id: P5_reproducibility_dq
    name: "Reproducibility & Data Quality Gates"
    blocks_merge: true
  - id: P6_work_item_hygiene
    name: "Work Item Hygiene & Traceability"
    blocks_merge: true
  - id: P7_hierarchy_integrity
    name: "Hierarchy Integrity & Lifecycle Cascade"
    blocks_merge: true

# ---------------------------------------------------------------------------
# Work-item hygiene (Principle VI) — enforced by /speckit.tasks and the
# AI PR Review pipeline.
# ---------------------------------------------------------------------------
work_item_hygiene:
  task_title_pattern: "^\\[(CSP|CSPvNext|POSOT_Sales|MSSalesUserSecurity|Investment_FDL|APA-ACR|SalesReports)\\]: .{8,}$"
  task_title_reject_message: |
    Task title must start with an approved domain tag in brackets and
    contain a specific noun phrase (≥ 8 chars). Example:
      [CSP]: Field Dashboard SM — remove unused tables & retest RLS (PR #####)
    Reject: [CSP]: Work on Customer Reporting Phase 2  (too generic, collides).
  tag_taxonomy:
    workflow:  ["Copilot", "WorkFAST", "SpecKit"]
    sprint:    ["Target 1", "Target 2", "Target 3"]   # pick exactly one per Task
    lifecycle: ["Done", "Blocked", "Waiver"]
    domain:    ["CSP", "CSPvNext", "POSOT_Sales", "MSSalesUserSecurity",
                "Investment_FDL", "APA-ACR"]
    forbidden_pattern: "^Copilot ?[0-9]+$"            # blocks 'Copilot 1', etc.
  closure_comment:
    require_pr_id: true
    require_done_tag: true
  parent_link:
    task_must_parent_to: "Scenario Detail"
    scenario_detail_must_parent_to: "Business Scenario"
  state_sync:
    sd_active_when: "any_child_task_active_or_closed"
    sd_closed_when: "all_child_tasks_closed_or_descoped"
  test_case_required_when:
    story_points_gte: 8
    schema_affecting: true
  fields_required:
    task_active:        ["OriginalEstimate_or_StoryPoints"]
    scenario_detail_active: ["TargetDate"]
    scenario_detail_any:    ["Description", "AcceptanceCriteria_or_ReproSteps"]

# ---------------------------------------------------------------------------
# Hierarchy integrity (Principle VII) — enforced by /speckit.tasks audit
# and by the AI PR Review pipeline before merge.
# ---------------------------------------------------------------------------
hierarchy_integrity:
  type_hierarchy:
    program_children:           ["Project"]
    project_children:           ["Business Scenario"]
    business_scenario_children: ["Scenario Detail"]
    scenario_detail_children:   ["Task", "Bug", "Test Case"]
    violation_severity: "P0"      # any deviation is a blocking P0
  closure_cascade:
    blocks_close_when_any_child_in:
      ["New", "Active", "Ready", "Ready for Engineering", "Blocked", "On Hold"]
    applies_to: ["Project", "Business Scenario", "Scenario Detail"]
  closed_with_sprint_required:
    forbidden_iteration_paths:
      - "Global Partner Solutions"
      - "^Global Partner Solutions\\\\FY[0-9]{2}$"      # FY root, no quarter
    applies_to: ["Business Scenario", "Scenario Detail"]
  carryover_links:
    required_when: "title_clone_across_projects"
    accept_either:
      - "predecessor_successor_relation"
      - "source_state_removed_with_successor_comment"
    source_state_when_resolved: "Removed"
  allowed_states:
    business_scenario: ["New", "Active", "Ready", "Blocked", "Resolved", "Closed", "Removed"]
    scenario_detail:   ["New", "Active", "Ready", "Blocked", "Resolved", "Closed", "Removed"]
    task:              ["New", "Active", "Ready", "Blocked", "Resolved", "Closed", "Removed"]
    forbidden:
      - state: "On Hold"
        migrate_to: "Blocked"
      - state: "Ready for Engineering"
        migrate_to: "Ready"
  sprint_scope:
    project_iteration_pattern: "^Global Partner Solutions\\\\FY[0-9]{2}\\\\Q[1-4]"
    sprint_belongs_to_one_project: true
    program_cross_cutting_exempt_tag: "program-cross-cutting"
  calendar_gate:
    cutoff_project_id: 34134                # FY26 Q3 — first Project with Desc/AC discipline
    pre_cutoff_treatment: "legacy_read_only"
    legacy_tag_to_apply: "legacy-pre-Q3"
  project_documentation_uniqueness:
    custom_fields_must_be_unique_across_projects:
      ["CurrentState", "DesiredState", "ProjectKRs", "StatusNarrative",
       "WorkCompleted", "WorkPlanned", "ProjectSummary", "ImpactsIfNotDone"]
    duplicate_severity: "WARN"
  story_points_rollup:
    business_scenario_sp: "sum_of_child_sd_sp"
    independent_bs_sp_entry: "forbidden"
  recurring_themes_pre_seed:
    on_new_quarterly_project: true
    themes:
      - "Executive Views / Summary"
      - "Channel Motion Logic"
      - "Exception / Exemption Logic"
      - "Customer Journey / SMB"

# ---------------------------------------------------------------------------
# Domain registry — keep aligned with MSSales/Fabric/* folders.
# Used by /speckit.specify to suggest the correct owning domain.
# ---------------------------------------------------------------------------
domains:
  - key: CSPvNext
    path: "MSSales/Fabric/CSPvNext"
    reporting_path: "MSSales/Fabric/CSPvNextReporting"
    lakehouses: ["POSOT_CSP", "POSOT_CSPvNext_Reporting"]
    master_pipelines:
      - "CSP_Master_Refresh_Full"
      - "CSP_Staging_Master_Refresh_Full"
      - "CSP_Reporting_Refresh_Full"
    bvt: ["CSP_Silver_BVT", "CSP_Mart_Master_BVT"]
    dq_agents: ["CSP_DataQualityAgent_Silver", "CSP_DataQualityAgent_Gold"]
  - key: POSOT_Sales
    path: "MSSales/Fabric/POSOT_Sales"
    reporting_path: "MSSales/Fabric/SalesReporting"
    lakehouses: ["POSOT_Sales_Reporting"]
  - key: SalesReports
    path: "MSSales/Fabric/Sales Reports"
  - key: MSSalesUserSecurity
    path: "MSSales/Fabric/MSSalesUserSecurity"
  - key: Investment_FDL
    path: "MSSales/Fabric/Investment_FDL"

# ---------------------------------------------------------------------------
# Approved Spark pool environments (Principle III)
# ---------------------------------------------------------------------------
compute_environments:
  - "Small_Pool"
  - "Medium_Pool"
  - "Large_Pool"
  - "XLarge_Pool"
  - "XXLarge_Pool"
