# SSAS / AAS Server Catalog — TEMPLATE
# Purpose: Map server hostnames and databases for on-prem SSAS and Azure AAS connections
# Usage:  Copy this file to ssas-catalog.yaml and fill in your real server details.
#         ssas-catalog.yaml is gitignored and stays local.

metadata:
  version: "2026-02-25"
  owner: "<YOUR_TEAM_NAME>"
  notes: "Add new servers as they are discovered. Use hostname resolvable from the agent's network."

# =============================================================================
# SERVERS AND DATABASES
# =============================================================================

servers:
  EXAMPLE_SSAS:
    type: on-prem-ssas          # on-prem-ssas | azure-aas
    hostname: "<YOUR_SSAS_HOSTNAME>"
    # For Azure AAS, use: asazure://<region>.asazure.windows.net/<servername>
    auth: windows               # windows | aad-token
    databases:
      EXAMPLE_DB:
        summary: "<Describe your tabular model — key subject areas and data domains.>"
        compatibilityLevel: 1600
        keyTables:
          - "<Table 1>"
          - "<Table 2>"
        keyMeasures: []         # Populate after measure discovery
        roleAccess: "Read"

# =============================================================================
# EXAMPLE: Azure AAS Entry
# =============================================================================
