name: PR Approval Gate

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  check-approval:
    name: Require Owner Approval
    runs-on: ubuntu-latest
    steps:
      - name: Check for required approval from repo owner
        uses: actions/github-script@v7
        with:
          script: |
            const REQUIRED_REVIEWER = 'v-arloonker';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number,
            });

            const approved = reviews.data.some(
              (review) =>
                review.user.login === REQUIRED_REVIEWER &&
                review.state === 'APPROVED'
            );

            if (!approved) {
              core.setFailed(
                `PR requires approval from @${REQUIRED_REVIEWER} before merging.`
              );
            } else {
              core.info(`Approved by @${REQUIRED_REVIEWER}`);
            }
